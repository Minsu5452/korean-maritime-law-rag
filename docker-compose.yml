services:
  neo4j:
    image: neo4j:5
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/marinerag
    volumes: ["neo4j_data:/data"]
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]

  # 로컬 모니터링. INIT_* 환경변수로 개발용 프로젝트를 자동 생성한다.
  # 자체 호스팅 로컬 자격증명이라 외부 비밀이 아니다(모니터링은 선택 기능).
  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes: ["langfuse_db:/var/lib/postgresql/data"]
  langfuse:
    image: langfuse/langfuse:2
    depends_on: ["langfuse-db"]
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-dev-nextauth-secret
      SALT: local-dev-salt
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: korean-maritime-law-rag
      LANGFUSE_INIT_PROJECT_ID: mlr
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-localdev
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-localdev
      LANGFUSE_INIT_USER_EMAIL: admin@local.dev
      LANGFUSE_INIT_USER_NAME: admin
      LANGFUSE_INIT_USER_PASSWORD: localdevpass1

volumes:
  neo4j_data:
  qdrant_data:
  langfuse_db:
